model_reasoning_effort = "medium"
approval_policy = "never"
default_permissions = "default"

[memories]
generate_memories = false
use_memories = false

[features]
unified_exec = true

[tui.keymap.composer]
submit = ["ctrl-enter", "ctrl-j"]

[tui.keymap.editor]
insert_newline = "enter"

[tui]
status_line = [
  "model-with-reasoning",
  "fast-mode",
  "context-remaining",
  "five-hour-limit",
  "weekly-limit",
]

[shell_environment_policy]
inherit = "core"
ignore_default_excludes = false
experimental_use_profile = false
include_only = [
  "PATH",
  "HOME",
  "USER",
  "SHELL",
  "LANG",
  "LC_ALL",
  "UV_*",
]

[shell_environment_policy.set]
HOME = "/home/ubuntu"
USER = "ubuntu"
UV_CACHE_DIR = "/workspace/_cache/codex_uv_cache"
UV_PROJECT_ENVIRONMENT = "/workspace/_cache/codex_venv"
UV_LINK_MODE = "copy"

[projects."/workspace"]
trust_level = "trusted"

[permissions.default]
description = "Container workspace with protected credentials"
extends = ":workspace"

[permissions.default.filesystem]
"/" = "read"
"/workspace/_local/codex_homes/auth.json" = "deny"
"/home/ubuntu/.codex/auth.json" = "deny"
"/workspace/.env" = "deny"

[permissions.default.network]
enabled = true

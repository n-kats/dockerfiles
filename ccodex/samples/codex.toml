model = "gpt-5.6-luna"
context_window = 272000
model_reasoning_effort = "medium"
approval_policy = "never"
sandbox_mode = "danger-full-access"
custom.user_shell.no_inject=true
default_permissions = "default"

[sandbox_workspace_write]
network_access = true

[memories]
generate_memories = false
use_memories = false

[features]
unified_exec = true

[tui.keymap.composer]
submit = ["ctrl-enter", "ctrl-j"]

[tui.keymap.editor]
insert_newline = "enter"

[tui]
status_line = [
  "model-with-reasoning",
  "fast-mode",
  "context-remaining",
  "five-hour-limit",
  "weekly-limit",
]

[shell_environment_policy]
inherit = "core"
ignore_default_excludes = false
experimental_use_profile = false
include_only = [
  "PATH",
  "HOME",
  "USER",
  "SHELL",
  "LANG",
  "LC_ALL",
  "UV_*",
]

[shell_environment_policy.set]
HOME = "/home/ubuntu"
USER = "ubuntu"
UV_CACHE_DIR = "/workspace/_cache/codex_uv_cache"
UV_PROJECT_ENVIRONMENT = "/workspace/_cache/codex_uv_venv"
UV_LINK_MODE = "copy"

[projects."/workspace"]
trust_level = "trusted"

[notice]
fast_default_opt_out = true
hide_rate_limit_model_nudge = true
hide_full_access_warning = true

[custom.theme.diff]
add_line_bg = "#ccffcc"
del_line_bg = "#cccccc"

[permissions.default.filesystem]
"/" = "read"
"/workspace" = "write"
"/workspace/_local/codex_homes/auth.json" = "deny"
"/workspace/_local/claude.json" = "deny"

[permissions.default.network]
enabled = true
